<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press — Miha Presker</title>
  <link rel="stylesheet" href="/art/art.css">
</head>
<body>
  <div class="top-bar"></div>
  <div class="art-shell">
    <nav class="art-nav" id="art-nav"></nav>
    <main class="art-main">

      <div class="page-header">
        <div class="page-eyebrow">Miha Presker</div>
        <h1 class="page-title">Press</h1>
      </div>

      <!-- Downloads -->
      <div class="press-dl">
        <div class="section-title">Press Kit Downloads</div>
        <div class="dl-grid">
          <a href="/art/downloads/presker-portrait.jpg" class="dl-item" download>
            <div class="dl-type">JPG</div>
            <div class="dl-name">Artist Portrait</div>
          </a>
          <a href="/art/downloads/presker-biography.pdf" class="dl-item" download>
            <div class="dl-type">PDF</div>
            <div class="dl-name">Biography</div>
          </a>
          <a href="/art/downloads/presker-statement.pdf" class="dl-item" download>
            <div class="dl-type">PDF</div>
            <div class="dl-name">Statement</div>
          </a>
          <a href="/art/downloads/presker-cv.pdf" class="dl-item" download>
            <div class="dl-type">PDF</div>
            <div class="dl-name">CV</div>
          </a>
          <a href="/art/downloads/presker-photos.zip" class="dl-item" download>
            <div class="dl-type">ZIP</div>
            <div class="dl-name">High-res Photos</div>
          </a>
          <a href="/art/downloads/presker-presskit.pdf" class="dl-item" download>
            <div class="dl-type">PDF</div>
            <div class="dl-name">Press Kit</div>
          </a>
        </div>
      </div>

      <!-- Press coverage -->
      <div class="pub-list">
        <div class="section-title" style="margin: 0 0 0.5rem; padding-top: 2rem;">Coverage</div>

        <div class="pub-card">
          <div class="pub-year">[Year]</div>
          <div class="pub-content">
            <div class="pub-title">[Article title]</div>
            <div class="pub-meta">Der Standard</div>
            <a href="#" class="pub-link">Read ↗</a>
          </div>
        </div>

        <div class="pub-card">
          <div class="pub-year">[Year]</div>
          <div class="pub-content">
            <div class="pub-title">[Article title]</div>
            <div class="pub-meta">Maska</div>
            <a href="#" class="pub-link">Read ↗</a>
          </div>
        </div>

        <!-- Add press items here -->
      </div>

    </main>
  </div>
  <script src="/art/nav.js"></script>
</body>
</html>
