<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light Sculptures — Miha Presker</title>
  <link rel="stylesheet" href="/art/art.css">
</head>
<body>
  <div class="top-bar"></div>
  <div class="art-shell">
    <nav class="art-nav" id="art-nav"></nav>
    <main class="art-main">

      <div class="page-header">
        <div class="page-eyebrow">Works</div>
        <h1 class="page-title">Light Sculptures</h1>
      </div>

      <div class="works-section">
        <div class="works-grid">
          <a href="/art/projects/tube.html" class="work-card">
            <div class="work-card-img"><img src="/art/images/tube/tube-01.jpg" alt="White inflated fabric tubes converging on a glowing light box" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'work-card-ph\'><span>image</span></div>'"></div>
            <div class="work-card-info"><div class="work-card-title">Tube</div><div class="work-card-meta">2008</div></div>
          </a>
          <a href="/art/projects/knot.html" class="work-card">
            <div class="work-card-img"><img src="/art/images/knot/knot-01.jpg" alt="Tangled, internally lit white fabric tubes" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'work-card-ph\'><span>image</span></div>'"></div>
            <div class="work-card-info"><div class="work-card-title">Knot (Energy Knot)</div><div class="work-card-meta">Light Sculpture</div></div>
          </a>
          <a href="/art/projects/breather.html" class="work-card">
            <div class="work-card-img"><img src="/art/images/breather/breather-01.jpg" alt="A backlit panel etched with branching, vein-like lines" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'work-card-ph\'><span>image</span></div>'"></div>
            <div class="work-card-info"><div class="work-card-title">Breather</div><div class="work-card-meta">2008</div></div>
          </a>
        </div>
      </div>

      <p style="padding: 0 3rem 3rem; font-size: 12px; color: var(--dim);">Grouped here on shared medium — inflated/illuminated membrane forms. Category assignment is a first pass; correct or reassign once full project details are confirmed.</p>

    </main>
  </div>
  <script src="/art/nav.js"></script>
</body>
</html>
