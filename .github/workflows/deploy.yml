name: Deploy to presker.at

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS
        run: |
          lftp -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} \
            -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate false; mirror -R --delete --exclude .git --exclude .github . /www; bye" \
            ftp.world4you.com
