name: Deploy to presker.at

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} sftp.world4you.com << EOF
          set sftp:auto-confirm yes
          set net:timeout 10
          mirror -R --delete --exclude .git --exclude .github . /www
          bye
          EOF
